---
name: docker-publish

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: read
      packages: write # push the image to GHCR
      id-token: write # keyless signing for the provenance attestation
      attestations: write # write the build-provenance attestation
    uses: projectpotos/actions/.github/workflows/release-container.yaml@31a073ace13fa1f689fe54cd71754f0ecba6dfb6 # v0.5.0
    with:
      # main        -> :edge
      # v1.2.3      -> :1.2.3, :1.2, :1, :latest
      # v1.2.3-rc.1 -> :1.2.3-rc.1, :rc
      # every run   -> :sha-<commit>
      tags: |
        type=edge,branch=main
        type=semver,pattern={{version}}
        type=semver,pattern={{major}}.{{minor}}
        type=semver,pattern={{major}}
        type=raw,value=rc,enable=${{ startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '-rc') }}
        type=sha
      labels: |
        org.opencontainers.image.title=potos-iso-builder
        org.opencontainers.image.description=Build customised Fedora installer ISOs with kickstart
        org.opencontainers.image.licenses=GPL-3.0-or-later
        maintainer=Project Potos <potos@adfinis.com>
